appname = nps
#Boot mode(dev|pro)
runmode = pro

#HTTP(S) proxy port, no startup if empty
http_proxy_ip=0.0.0.0
http_proxy_port=80
https_proxy_port=443
https_just_proxy=true
#default https certificate setting
https_default_cert_file=conf/server.pem
https_default_key_file=conf/server.key

##bridge
bridge_type=tcp
bridge_port=8024
bridge_ip=0.0.0.0

# enable tls
tls_enable=true
tls_bridge_port=8025

# Public password, which clients can use to connect to the server
# After the connection, the server will be able to open relevant ports and parse related domain names according to its own configuration file.
public_vkey=7vMBCgck0RszXv1H

#Traffic data persistence interval(minute)
#Ignorance means no persistence
flow_store_interval=1

# log level LevelEmergency->0  LevelAlert->1 LevelCritical->2 LevelError->3 LevelWarning->4 LevelNotice->5 LevelInformational->6 LevelDebug->7
log_level=6
log_path=nps.log
# HTTP access log file for Loki/Promtail collection. Empty means disabled.
http_access_log_path=access.log
# Rotate access log by size. 0 disables built-in rotation.
http_access_log_max_size_mb=100
http_access_log_max_backups=3
# Comma-separated query keys to mask in access log URLs. Empty means no masking.
http_access_log_mask_query_keys=token,secret
# Comma-separated paths to skip. Supports prefix wildcard like /static/*.
http_access_log_exclude_paths=/favicon.ico,/static/*
# Comma-separated hosts to skip. Supports wildcard like *.example.com.
http_access_log_exclude_hosts=
# Comma-separated error messages to skip. Supports wildcard like *host could not be parsed*.
http_access_log_exclude_errors=
# Comma-separated error types to skip, for example host_parse_error,host_not_matched,timeout,client_closed,upstream_error,proxy_error.
http_access_log_exclude_error_types=
# Only log requests whose duration is at least this many milliseconds. 0 logs all.
http_access_log_min_duration_ms=0
# Comma-separated field whitelist. Empty means all fields.
http_access_log_fields=

#Whether to restrict IP access, true or false or ignore
#ip_limit=true

#p2p
#p2p_ip=127.0.0.1
#p2p_port=6000

#web
web_host=a.o.com
web_username=admin
web_password=nps123
web_port=8080
web_ip=0.0.0.0
web_base_url=
web_open_ssl=false
web_cert_file=conf/server.pem
web_key_file=conf/server.key
# if web under proxy use sub path. like http://host/nps need this.
#web_base_url=/nps

#Web API unauthenticated IP address(the len of auth_crypt_key must be 16)
#Remove comments if needed
auth_key=7vMBCgck0RszXYxH
#获取服务端authKey时的aes加密密钥，16位
auth_crypt_key=QbUxVWlPGHng8q6p

#allow_ports=9001-9009,10001,11000-12000

#Web management multi-user login
allow_user_login=false
allow_user_register=false
allow_user_change_username=false

#extension
# 是否开启本地代理, 无需客户端即可实现流量转发
allow_local_proxy=true
#流量限制
allow_flow_limit=false
#带宽限制
allow_rate_limit=false
#客户端最大隧道数限制
allow_tunnel_num_limit=false
#客户端最大连接数
allow_connection_num_limit=false
#每个隧道监听不同的服务端端口
allow_multi_ip=true
#系统负载监控
system_info_display=true

#获取用户真实ip
http_add_origin_header=true

#客户端公网 IP 归属地显示，默认开启；成功缓存小时数、失败缓存分钟数用于避免频繁调用第三方接口
ip_location=true
ip_location_cache_hours=24
ip_location_fail_cache_minutes=60
ip_location_api=https://ip.cn/ip/%s.html

#cache
http_cache=false
http_cache_length=100

#get origin ip
#http_add_origin_header=false

#pprof debug options
#pprof_ip=0.0.0.0
#pprof_port=9999

#client disconnect timeout
disconnect_timeout=60

#nps waits for npc to accept a new proxy connection, unit: seconds
client_connect_timeout_seconds=2

#npc connects to target server timeout, unit: seconds
target_connect_timeout_seconds=2

#npc retries when connecting to the target server fails or times out
target_connect_retry_count=2

#npc or nps LocalProxy random wait before retrying target connection, unit: milliseconds. 0 means no wait.
target_connect_retry_interval_ms=0

#nps waits for upstream HTTP response headers, unit: seconds. 0 means no limit.
upstream_response_timeout_seconds=0

# enable captcha in login page
open_captcha=true
