name: Release

on:
  release:
    types: [published]
    branches: [ master ]
  watch:
    types: [started]
    if: github.event.repository.owner.id == github.event.sender.id
  push:
    paths:
    - .github/workflows/release.yml

jobs:
  build_assets:
    runs-on: ubuntu-latest
    steps:

    - name: Set up Go 1.22
      uses: actions/setup-go@v4
      with:
        go-version: 1.22
      id: go
    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
    - name: Get dependencies
      run: |
        go get -v -t -d ./...
        if [ -f Gopkg.toml ]; then
            curl https://raw.githubusercontent.com/golang/dep/master/install.sh | sh
            dep ensure
        fi
    - name: Build
      run: |
        chmod +x build.assets.sh
        ./build.assets.sh
    - name: Create GitHub Release (assets)
      id: create_release_assets
      uses: actions/create-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        tag_name: ${{ github.ref_name }}
        release_name: ${{ github.ref_name }}
        body: Release ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload release assets (batch)
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release_assets.outputs.upload_url }}
      run: |
        UPLOAD_URL="${UPLOAD_URL%\{*}"
        files=(
          freebsd_386_client.tar.gz
          freebsd_386_server.tar.gz
          freebsd_amd64_client.tar.gz
          freebsd_amd64_server.tar.gz
          freebsd_arm_client.tar.gz
          freebsd_arm_server.tar.gz
          linux_386_client.tar.gz
          linux_386_server.tar.gz
          linux_amd64_client.tar.gz
          linux_amd64_server.tar.gz
          linux_arm64_client.tar.gz
          linux_arm64_server.tar.gz
          linux_arm_v5_client.tar.gz
          linux_arm_v6_client.tar.gz
          linux_arm_v7_client.tar.gz
          linux_arm_v5_server.tar.gz
          linux_arm_v6_server.tar.gz
          linux_arm_v7_server.tar.gz
          linux_mips64le_client.tar.gz
          linux_mips64le_server.tar.gz
          linux_mips64_client.tar.gz
          linux_mips64_server.tar.gz
          linux_mipsle_client.tar.gz
          linux_mipsle_server.tar.gz
          linux_mips_client.tar.gz
          linux_mips_server.tar.gz
          darwin_amd64_client.tar.gz
          darwin_amd64_server.tar.gz
          windows_386_client.tar.gz
          windows_386_server.tar.gz
          windows_amd64_client.tar.gz
          windows_amd64_server.tar.gz
          npc_sdk.tar.gz
        )
        for f in "${files[@]}"; do
          if [ -f "$f" ]; then
            echo "Uploading $f"
            curl -sSL -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/gzip" \
              --data-binary @"$f" "$UPLOAD_URL?name=$(basename "$f")"
          else
            echo "Warning: $f not found, skipping"
          fi
        done

  build_android:

    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
    - name: Build
      run: |
        chmod +x build.android.sh
        docker run --rm -i -w /app -v $(pwd):/app -e ANDROID_HOME=/usr/local/android_sdk -e GOPROXY=direct fyneio/fyne-cross:android-latest /app/build.android.sh
    - name: Upload
      id: create_release_android
      uses: actions/create-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        tag_name: ${{ github.ref_name }}
        release_name: ${{ github.ref_name }}-android
        body: Android build for ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload android apk
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release_android.outputs.upload_url }}
      run: |
        UPLOAD_URL="${UPLOAD_URL%\{*}"
        f=android_client.apk
        if [ -f "$f" ]; then
          curl -sSL -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/vnd.android.package-archive" --data-binary @"$f" "$UPLOAD_URL?name=$(basename "$f")"
        else
          echo "Warning: $f not found, skipping"
        fi

  build_spk:

    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
    - name: Set env
      run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
    - name: Build
      run: |
        git clone https://github.com/cnlh/spksrc.git ~/spksrc
        mkdir -p ~/spksrc/nps && cp -rf ./* ~/spksrc/nps/
        # prepare a local distrib tarball so spksrc won't try to download the (possibly outdated) remote archive
        VER_NO_V=$(echo "${{ env.RELEASE_VERSION }}" | sed 's/^v//')
        mkdir -p ~/spksrc/distrib ~/spksrc/tmp
        cp -r ~/spksrc/nps ~/spksrc/tmp/nps-${VER_NO_V}
        tar czf ~/spksrc/distrib/npc-${VER_NO_V}.tar.gz -C ~/spksrc/tmp nps-${VER_NO_V}
        # also create a tarball with the raw tag name (in case spksrc expects the v-prefixed name)
        tar czf ~/spksrc/distrib/npc-${{ env.RELEASE_VERSION }}.tar.gz -C ~/spksrc/tmp nps-${VER_NO_V} || true
        # start build container and run packaging using the local distrib file; avoid `make setup` which downloads Go
        docker run -id --name spksrc --env VERSION=${{ env.RELEASE_VERSION }} -e GOPROXY=direct -v ~/spksrc:/spksrc synocommunity/spksrc /bin/bash
        docker exec spksrc /bin/bash -c 'cd /spksrc && sed -i s/1.15.6/1.19.5/g native/go/Makefile && echo "go1.19.5.src.tar.gz SHA256 8e486e8e85a281fc5ce3f0bedc5b9d2dbf6276d7db0b25d3ec034f313da0375f" > native/go/digests && cd /spksrc/spk/npc && make'
        cp ~/spksrc/packages/npc_noarch-all_${{ env.RELEASE_VERSION }}-1.spk ./npc_syno.spk
    - name: Upload
      id: create_release_spk
      uses: actions/create-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        tag_name: ${{ github.ref_name }}
        release_name: ${{ github.ref_name }}-spk
        body: Synology spk for ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload spk
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ steps.create_release_spk.outputs.upload_url }}
      run: |
        UPLOAD_URL="${UPLOAD_URL%\{*}"
        f=npc_syno.spk
        if [ -f "$f" ]; then
          curl -sSL -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"$f" "$UPLOAD_URL?name=$(basename "$f")"
        else
          echo "Warning: $f not found, skipping"
        fi

  build_docker:

    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
    - name: Set env
      run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push nps
      uses: docker/build-push-action@v3
      with:
        context: .
        file: ./Dockerfile.nps
        platforms: linux/amd64,linux/arm,linux/arm64
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/nps:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/nps:${{ env.RELEASE_VERSION }}
    - name: Build and push npc
      uses: docker/build-push-action@v3
      with:
        context: .
        file: ./Dockerfile.npc
        platforms: linux/amd64,linux/arm,linux/arm64
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/npc:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/npc:${{ env.RELEASE_VERSION }}
