name: Release

on:
  release:
    types: [published]
    branches: [ master ]
  watch:
    types: [started]
    if: github.event.repository.owner.id == github.event.sender.id
  push:
    paths:
    - .github/workflows/release.yml

jobs:
  create_release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.get_upload_url.outputs.upload_url }}
    steps:
    - name: Install GitHub CLI
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y ca-certificates curl gnupg lsb-release
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        sudo chmod 644 /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt-get update
        sudo apt-get install -y gh

    - name: Determine tag and create or locate release
      id: get_upload_url
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        # determine tag name (works for push or release events)
        if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
          TAG=$(jq -r .release.tag_name "$GITHUB_EVENT_PATH")
        else
          TAG="${GITHUB_REF#refs/tags/}"
        fi
        if [ -z "$TAG" ] || [ "$TAG" = "refs/tags/" ]; then
          echo "No tag found; leaving upload_url empty"
          echo "upload_url=" >> $GITHUB_OUTPUT
          exit 0
        fi

        if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
          echo "Attempting to create release for $TAG (push event)"
          # try to create; if it fails because it exists, we'll fall back to view
          if gh release create "$TAG" --title "$TAG" --notes "Release $TAG" --repo "$GITHUB_REPOSITORY"; then
            echo "Created release $TAG"
          else
            echo "Create failed or release exists; will view existing release"
          fi
          upload_url=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json uploadUrl -q .uploadUrl)
        else
          echo "Using release payload for $TAG (release event)"
          upload_url=$(jq -r .release.upload_url "$GITHUB_EVENT_PATH")
        fi

        echo "upload_url=$upload_url" >> $GITHUB_OUTPUT

  build_assets:
    needs: create_release
    runs-on: ubuntu-latest
    steps:

    - name: Set up Go 1.22
      uses: actions/setup-go@v4
      with:
        go-version: 1.22
      id: go
    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Get dependencies
      run: |
        go mod download
        if [ -f Gopkg.toml ]; then
            curl https://raw.githubusercontent.com/golang/dep/master/install.sh | sh
            dep ensure
        fi
    - name: Compress web assets
      run: |
        # Install compression tools
        npm install -g html-minifier-terser terser clean-css-cli

        # Compress all HTML files in web/views
        find web/views -name "*.html" -type f | while read file; do
          echo "Compressing: $file"
          html-minifier-terser --collapse-whitespace --remove-comments --remove-optional-tags --remove-redundant-attributes --remove-script-type-attributes --use-short-doctype --ignore-custom-fragments '/{{[\s\S]*?}}/' --minify-css true --minify-js true -o "$file" "$file"
        done

        # Compress all JS files in web/static/js
        find web/static/js -name "*.js" -type f | while read file; do
          echo "Compressing: $file"
          terser "$file" -o "$file" -c -m
        done

        # Compress all CSS files in web/static/css
        find web/static/css -name "*.css" -type f | while read file; do
          echo "Compressing: $file"
          cleancss -o "$file" "$file"
        done

        # Show size reduction
        echo "=== Web assets size after compression ==="
        du -sh web/
    - name: Build
      run: |
        chmod +x build.assets.sh
        ./build.assets.sh
    - name: Compress binaries with UPX
      run: |
        # Install UPX
        wget https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-amd64_linux.tar.xz
        tar -xf upx-4.2.4-amd64_linux.tar.xz
        sudo cp upx-4.2.4-amd64_linux/upx /usr/local/bin/

        # Compress all nps and npc binaries (skip Windows .exe for now as UPX may have issues)
        find . -name "nps" -type f -exec upx --best --lzma {} \; 2>/dev/null || true
        find . -name "npc" -type f -exec upx --best --lzma {} \; 2>/dev/null || true

        # Show size reduction
        echo "=== Binary sizes after UPX compression ==="
        du -sh *.tar.gz 2>/dev/null || true
    - name: Upload release assets (batch)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ needs.create_release.outputs.upload_url }}
      run: |
        UPLOAD_URL="${UPLOAD_URL%\{*}"
        files=(
          freebsd_386_client.tar.gz
          freebsd_386_server.tar.gz
          freebsd_amd64_client.tar.gz
          freebsd_amd64_server.tar.gz
          freebsd_arm_client.tar.gz
          freebsd_arm_server.tar.gz
          linux_386_client.tar.gz
          linux_386_server.tar.gz
          linux_amd64_client.tar.gz
          linux_amd64_server.tar.gz
          linux_arm64_client.tar.gz
          linux_arm64_server.tar.gz
          linux_arm_v5_client.tar.gz
          linux_arm_v6_client.tar.gz
          linux_arm_v7_client.tar.gz
          linux_arm_v5_server.tar.gz
          linux_arm_v6_server.tar.gz
          linux_arm_v7_server.tar.gz
          linux_mips64le_client.tar.gz
          linux_mips64le_server.tar.gz
          linux_mips64_client.tar.gz
          linux_mips64_server.tar.gz
          linux_mipsle_client.tar.gz
          linux_mipsle_server.tar.gz
          linux_mips_client.tar.gz
          linux_mips_server.tar.gz
          darwin_amd64_client.tar.gz
          darwin_amd64_server.tar.gz
          windows_386_client.tar.gz
          windows_386_server.tar.gz
          windows_amd64_client.tar.gz
          windows_amd64_server.tar.gz
          npc_sdk.tar.gz
        )
        for f in "${files[@]}"; do
          if [ -f "$f" ]; then
            echo "Uploading $f"
            curl -sSL -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/gzip" \
              --data-binary @"$f" "$UPLOAD_URL?name=$(basename "$f")"
          else
            echo "Warning: $f not found, skipping"
          fi
        done

  build_android:
    needs: create_release
    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
    - name: Build
      run: |
        chmod +x build.android.sh
        docker run --rm -i -w /app -v $(pwd):/app -e ANDROID_HOME=/usr/local/android_sdk -e GOPROXY=direct fyneio/fyne-cross:android-latest /app/build.android.sh
    - name: Upload android apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        UPLOAD_URL: ${{ needs.create_release.outputs.upload_url }}
      run: |
        UPLOAD_URL="${UPLOAD_URL%\{*}"
        f=android_client.apk
        if [ -f "$f" ]; then
          curl -sSL -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/vnd.android.package-archive" --data-binary @"$f" "$UPLOAD_URL?name=$(basename "$f")"
        else
          echo "Warning: $f not found, skipping"
        fi

  build_docker:

    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4
    - name: Set env
      run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
    - name: Set up Go 1.22
      uses: actions/setup-go@v4
      with:
        go-version: 1.22
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Prepare Docker build context
      run: |
        set -euo pipefail

        go mod download

        npm install -g html-minifier-terser terser clean-css-cli

        find web/views -name "*.html" -type f | while read file; do
          echo "Compressing: $file"
          html-minifier-terser --collapse-whitespace --remove-comments --remove-optional-tags --remove-redundant-attributes --remove-script-type-attributes --use-short-doctype --ignore-custom-fragments '/{{[\s\S]*?}}/' --minify-css true --minify-js true -o "$file" "$file"
        done

        find web/static/js -name "*.js" -type f | while read file; do
          echo "Compressing: $file"
          terser "$file" -o "$file" -c -m
        done

        find web/static/css -name "*.css" -type f | while read file; do
          echo "Compressing: $file"
          cleancss -o "$file" "$file"
        done

        build_linux() {
          local app="$1"
          local target="$2"
          local goarch="$3"
          local goarm="${4:-}"
          local output="docker-build/${app}/${target}/${app}"

          mkdir -p "$(dirname "$output")"
          echo "Building ${app} for ${target}"
          if [ -n "$goarm" ]; then
            CGO_ENABLED=0 GOOS=linux GOARCH="$goarch" GOARM="$goarm" go build -ldflags="-w -s -extldflags -static" -o "$output" "./cmd/${app}/${app}.go"
          else
            CGO_ENABLED=0 GOOS=linux GOARCH="$goarch" go build -ldflags="-w -s -extldflags -static" -o "$output" "./cmd/${app}/${app}.go"
          fi
          chmod +x "$output"
        }

        for app in nps npc; do
          build_linux "$app" amd64 amd64
          build_linux "$app" arm64 arm64
          build_linux "$app" armv7 arm 7
        done
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push nps
      uses: docker/build-push-action@v3
      with:
        context: .
        file: ./Dockerfile.nps
        platforms: linux/amd64,linux/arm64,linux/arm/v7
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/nps:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/nps:${{ env.RELEASE_VERSION }}
    - name: Build and push npc
      uses: docker/build-push-action@v3
      with:
        context: .
        file: ./Dockerfile.npc
        platforms: linux/amd64,linux/arm64,linux/arm/v7
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/npc:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/npc:${{ env.RELEASE_VERSION }}
