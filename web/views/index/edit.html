<div class="row tile">
    <div class="col-md-12 col-md-auto">
        <div class="ibox float-e-margins">
            <h3 class="ibox-title" langtag="page-{{if eq 0 .t.Id}}clone{{else}}edit{{end}}"></h3>
            <div class="ibox-content">
                <form class="form-horizontal">
                    <input type="hidden" name="id" value="{{.t.Id}}">
                    <div class="form-group">
                        <label class="col-sm-2 control-label font-bold" langtag="word-scheme"></label>
                        <div class="col-sm-10">
                            <span class="help-block m-b-none font-bold" langtag="word-usecase"></span>:
                            <span id="usecase">
                                <span id="casetcp" langtag="info-casetcp"></span>
                                <span id="caseudp" langtag="info-caseudp"></span>
                                <span id="casehttpProxy" langtag="info-casehttpproxy"></span>
                                <span id="casesocks5" langtag="info-casesocks5"></span>
                                <span id="casesecret" langtag="info-casesecret"></span>
                                <span id="casep2p" langtag="info-casep2p"></span>
                                <span id="casefile" langtag="info-casefile"></span>
                            </span>
                            <select class="form-control" name="type" id="type">
                                <option value="tcp" langtag="scheme-tcp"></option>
                                <option value="udp" langtag="scheme-udp"></option>
                                <option value="httpProxy" langtag="scheme-httpProxy"></option>
                                <option value="socks5" langtag="scheme-socks5"></option>
                                <option value="secret" langtag="scheme-secret"></option>
                                <option value="p2p" langtag="scheme-p2p"></option>
                                <option value="file" langtag="scheme-file"></option>
                            </select>
                        </div>
                    </div>

                    {{if eq true .allow_local_proxy}}
                        <div class="form-group">
                            <label class="control-label col-sm-2 font-bold" langtag="word-proxytolocal"></label>
                            <div class="col-sm-10">
                                <select class="form-control" id="local_proxy" name="local_proxy">
                                    <option  {{if eq false .t.Target.LocalProxy}}selected{{end}} value="0" langtag="word-no"></option>
                                    <option  {{if eq true .t.Target.LocalProxy}}selected{{end}} value="1" langtag="word-yes"></option>
                                </select>
                            </div>
                        </div>
                    {{end}}
                    <div class="form-group">
                        <label class="col-sm-2 control-label font-bold" langtag="word-clientid"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.Client.Id}}" value="{{.client_id}}" {{if eq true .t.Target.LocalProxy}}readonly{{end}}
                                class="form-control" type="text" id="client_id" name="client_id" placeholder="" langtag="word-clientid">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="col-sm-2 control-label font-bold" langtag="word-remark"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.Remark}}" class="form-control" type="text" name="remark" placeholder="" langtag="info-unrestricted">
                        </div>
                    </div>
                {{if eq true .allow_multi_ip}}
                    <div class="form-group" id="server_ip">
                        <label class="col-sm-2 control-label font-bold" langtag="word-serverip"></label>
                        <div class="col-sm-10">
                            <input class="form-control" type="text" value="{{.t.ServerIp}}" name="server_ip" placeholder="" langtag="info-suchasip">
                        </div>
                    </div>
                {{end}}
                    <div class="form-group" id="port">
                        <label class="col-sm-2 control-label font-bold" langtag="word-serverport"></label>
                        <div class="col-sm-10">
                            <div class="input-group">
                                <input value="{{.t.Port}}" class="form-control" type="text" name="port" placeholder="" langtag="info-suchasport">
                                <div class="input-group-append">
                                    <button class="btn btn-outline btn-primary" id="open-port-selector" type="button" style="display:none;">
                                        选择 <span class="js-proto-name">TCP</span> 端口
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group" id="target">
                        <label class="col-sm-2 control-label font-bold" langtag="word-target"></label>
                        <div class="col-sm-10">
                            <textarea class="form-control" name="target" rows="4" placeholder="" langtag="info-suchasiplist">{{.t.Target.TargetStr}}</textarea>
                            <span class="help-block m-b-none" langtag="info-targettunnel"></span>
                        </div>
                    </div>

                    <div class="form-group" id="local_path">
                        <label class="col-sm-2 control-label font-bold" langtag="word-localpath"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.LocalPath}}" class="form-control" type="text" name="local_path" placeholder="" langtag="info-suchaslocalpath">
                        </div>
                    </div>

                    <div class="form-group" id="strip_pre">
                        <label class="col-sm-2 control-label font-bold" langtag="word-stripprefix"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.StripPre}}" class="form-control" type="text" name="strip_pre" placeholder="" langtag="info-suchasstripprefix">
                        </div>
                    </div>

                    <div class="form-group" id="browse_url">
                        <label class="col-sm-2 control-label font-bold" langtag="word-browseurl"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.BrowseURL}}" class="form-control" type="url" name="browse_url" placeholder="https://files.example.com/download" langtag="info-browseurl">
                        </div>
                    </div>

                    <div class="form-group" id="allow_browse">
                        <label class="col-sm-2 control-label font-bold" langtag="word-allowbrowse"></label>
                        <div class="col-sm-10">
                            <select class="form-control" name="allow_browse">
                                <option {{if eq false .t.AllowBrowse}}selected{{end}} value="0" langtag="word-no"></option>
                                <option {{if eq true .t.AllowBrowse}}selected{{end}} value="1" langtag="word-yes"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" id="browse_password">
                        <label class="col-sm-2 control-label font-bold" langtag="word-browsepassword"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.BrowsePass}}" class="form-control" type="password" name="browse_password" autocomplete="new-password" placeholder="" langtag="word-browsepassword">
                        </div>
                    </div>

                    <div class="form-group" id="allow_upload">
                        <label class="col-sm-2 control-label font-bold" langtag="word-allowupload"></label>
                        <div class="col-sm-10">
                            <select class="form-control" name="allow_upload">
                                <option {{if eq false .t.AllowUpload}}selected{{end}} value="0" langtag="word-no"></option>
                                <option {{if eq true .t.AllowUpload}}selected{{end}} value="1" langtag="word-yes"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group" id="upload_password">
                        <label class="col-sm-2 control-label font-bold" langtag="word-uploadpassword"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.UploadPass}}" class="form-control" type="password" name="upload_password" autocomplete="new-password" placeholder="" langtag="word-uploadpassword">
                        </div>
                    </div>

                    <div class="form-group" id="password">
                        <label class="col-sm-2 control-label font-bold" langtag="word-identificationkey"></label>
                        <div class="col-sm-10">
                            <input value="{{.t.Password}}" class="form-control" type="text" name="password" placeholder="" langtag="word-identificationkey">
                            <span class="help-block m-b-none" langtag="info-identificationkey"></span>
                        </div>
                    </div>
                    <div class="hr-line-dashed"></div>
                    <div class="form-group">
                        <div class="col-sm-4 col-sm-offset-2">
                            <button class="btn btn-success" type="button" onclick="submitform('{{if eq 0 .t.Id}}add{{else}}edit{{end}}', '{{.web_base_url}}/index/{{if eq 0 .t.Id}}add{{else}}edit{{end}}', $('form').serializeArray())">
                                <i class="fa fa-fw fa-lg fa-check-circle"></i> <span langtag="word-save"></span>
                            </button>
                            <button class="btn btn-light" type="button" onclick="goback()">
                                <i class="fa fa-fw fa-lg fa-window-close"></i> <span langtag="word-cancel"></span>
                            </button>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="nps-port-selector-modal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-xl" role="document">
        <div class="modal-content animated fadeIn">
            <div class="modal-header">
                <h4 class="modal-title">选择 <span class="js-current-mode">TCP</span> 可用端口</h4>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="port-selector-toolbar">
                    <div class="form-group">
                        <label>端口段</label>
                        <select class="form-control" id="port-range-segment"></select>
                    </div>
                    <div class="form-group">
                        <label>起始端口</label>
                        <input type="number" class="form-control" id="port-range-start" min="1" max="65535" value="1">
                    </div>
                    <div class="form-group">
                        <label>每页范围</label>
                        <select class="form-control" id="port-page-size">
                            <option value="100">100</option>
                            <option value="200" selected>200</option>
                            <option value="500">500</option>
                            <option value="1000">1000</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <button type="button" class="btn btn-default" id="prev-port-range">上一页</button>
                        <button type="button" class="btn btn-default" id="next-port-range">下一页</button>
                        <button type="button" class="btn btn-primary" id="load-port-range">刷新</button>
                    </div>
                </div>
                <div class="port-selector-summary" id="port-range-summary"></div>
                <div class="port-selector-empty" id="port-range-empty" style="display:none;"></div>
                <div class="table-responsive">
                    <table class="table table-hover table-bordered port-selector-table">
                        <thead>
                        <tr>
                            <th class="port-col">端口</th>
                            <th class="port-process-col">占用进程</th>
                            <th class="port-quick-col">快捷可用端口</th>
                        </tr>
                        </thead>
                        <tbody id="port-range-rows"></tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="use-start-port">使用起始端口</button>
                <button type="button" class="btn btn-white" data-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>
<script>
    var arr = []
    arr["all"] = ["port", "target", "password", "local_path", "strip_pre", "browse_url", "allow_browse", "browse_password", "allow_upload", "upload_password", "local_proxy"]
    arr["tcp"] = ["client_id", "port", "target", "local_proxy"]
    arr["udp"] = ["client_id", "port", "target", "local_proxy"]
    arr["socks5"] = ["client_id", "port"]
    arr["httpProxy"] = ["client_id", "port"]
    arr["secret"] = ["client_id", "target", "password"]
    arr["p2p"] = ["client_id", "target", "password"]
    arr["file"] = ["client_id", "port", "local_path", "strip_pre", "browse_url", "allow_browse", "browse_password", "allow_upload", "upload_password", "local_proxy"]

    function syncLocalProxyClient() {
        var cid = $('#client_id')
        var localProxy = $('#local_proxy')
        if (!cid.length || !localProxy.length) {
            return
        }
        var useLocalProxy = localProxy.val() == 1
        cid.attr('readonly', useLocalProxy)
        if (useLocalProxy) {
            oldId = cid.val()
            if (oldId == '客户端 ID') {
                oldId = ''
            }
            if (oldId != '1') {
                cid.attr('oldId', oldId)
            }
            cid.val(1)
        } else {
            var oldId = cid.attr('oldId')
            cid.val(oldId === undefined ? '' : oldId)
        }
    }

    function applyFileDefaults(forceLocalProxy) {
        if ($("#type").val() == "file") {
            var localPath = $('input[name="local_path"]')
            if (localPath.val() == '') {
                localPath.val('/files')
            }
            if (forceLocalProxy && $('#local_proxy').length) {
                $('#local_proxy').val(1)
            }
        }
        syncLocalProxyClient()
        syncBrowsePassword()
        syncUploadPassword()
    }

    function syncBrowsePassword() {
        if ($("#type").val() == "file" && $('select[name="allow_browse"]').val() == "1") {
            $("#browse_password").css("display", "block")
        } else {
            $("#browse_password").css("display", "none")
        }
    }

    function syncUploadPassword() {
        if ($("#type").val() == "file" && $('select[name="allow_upload"]').val() == "1") {
            $("#upload_password").css("display", "block")
        } else {
            $("#upload_password").css("display", "none")
        }
    }

    function resetForm() {
        $(".form-group[id]").css("display", "none");
        $("#usecase span").css("display", "none");
        o = $("#type").val();
        $('#case'+ o).css("display", "inline")
        for (var i = 0; i < arr[o].length; i++) {
            $("#" + arr[o][i]).css("display", "block")
        }
    }

    $(function () {
        $("#type").val('{{.t.Mode}}');
        resetForm()
        applyFileDefaults(false)
        $("#type").on("change", function () {
            resetForm()
            applyFileDefaults($("#type").val() == "file")
        })
        $("#use_client").on("change", function () {
            resetForm()
        })
        $("#local_proxy").on("change", function (e) {
            syncLocalProxyClient()
        })
        $('select[name="allow_upload"]').on("change", function () {
            syncUploadPassword()
        })
        $('select[name="allow_browse"]').on("change", function () {
            syncBrowsePassword()
        })
        initPortSelector({
            taskId: {{.t.Id}},
            webBaseUrl: '{{.web_base_url}}'
        })
    })
</script>
