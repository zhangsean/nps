<div class="wrapper wrapper-content animated fadeInRight">

    <div class="row">
        <div class="col-lg-12">
            <div class="ibox float-e-margins">
                <div class="ibox-title">
                    <h5><span id="langtag"></span><span></span></h5>

                    <div class="ibox-tools">
                        <a class="collapse-link">
                            <i class="fa fa-chevron-up"></i>
                        </a>
                        <a class="close-link">
                            <i class="fa fa-times"></i>
                        </a>
                    </div>
                </div>
                <div class="content">
                    <div class="table-responsive">
                        <div id="toolbar">
                            <a href="{{.web_base_url}}/index/add?type={{.type}}&client_id={{.client_id}}" class="btn btn-primary dim list-form-link">
                            <i class="fa fa-fw fa-lg fa-plus"></i> <span langtag="word-add"></span></a>
                        </div>
                        <table id="taskList_table" class="table-striped table-hover" data-mobile-responsive="true"></table>
                    </div>
                </div>
                <div class="ibox-content">

                    <table id="table"></table>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    var indexBaseUrl = "{{.web_base_url}}";
    var bridgeType = "{{.bridgeType}}";
    var tunnelType = "{{.type}}";
    var tunnelClientId = "{{.client_id}}";
    var tunnelInitialSearch = new URLSearchParams(window.location.search).get("table_search") || "";
    var isFileTunnelList = tunnelType == "file";

    function getTunnelListSearchText() {
        return ($(".bootstrap-table .search input").val() || "").trim();
    }

    function syncTunnelListSearchUrl(searchText) {
        var url = new URL(window.location.href);
        if (searchText) {
            url.searchParams.set("table_search", searchText);
        } else {
            url.searchParams.delete("table_search");
        }
        history.replaceState(null, "", url.pathname + url.search + url.hash);
    }

    $(document).off('click.tunnelFormLink', '.list-form-link').on('click.tunnelFormLink', '.list-form-link', function () {
        syncTunnelListSearchUrl(getTunnelListSearchText());
    });

    function tunnelActionButton(action, path, id, btnClass, iconClass) {
        return '<a href="javascript:;" class="btn btn-outline ' + btnClass + ' tunnel-action"'
            + ' data-action="' + action + '" data-url="' + indexBaseUrl + path + '" data-id="' + id + '">'
            + '<i class="fa ' + iconClass + '"></i></a>';
    }

    $(document).off('click.tunnelAction', '#table .tunnel-action').on('click.tunnelAction', '#table .tunnel-action', function (event) {
        event.preventDefault();
        var button = $(this);
        submitform(button.attr('data-action'), button.attr('data-url'), {'id': Number(button.attr('data-id'))});
    });
    $('#langtag').attr('langtag','page-list{{.name}}').next().html('<a title="跳转到域名列表" href="hostlist?client_id={{.client_id}}">{{.client_id}}</a>');

    /*bootstrap table*/
    $('#table').bootstrapTable({
        toolbar: "#toolbar",
        method: 'post', // 服务器数据的请求方式 get or post
        url: "{{.web_base_url}}/index/gettunnel", // 服务器数据的加载地址
        queryParams: function (params) {
            return {
                "offset": params.offset,
                "limit": params.limit,
                "type": tunnelType,
                "client_id": tunnelClientId,
                "search": params.search
            }
        },
        search: true,
        searchText: tunnelInitialSearch,
        contentType: "application/x-www-form-urlencoded",
        striped: true, // 设置为true会有隔行变色效果
        showHeader: true,
        showColumns: true,
        showRefresh: true,
        pagination: true,//分页
        sidePagination: 'server',//服务器端分页
        pageNumber: 1,
        pageList: [5, 10, 20, 50],//分页步进值
        detailView: true,
        smartDisplay: true, // 智能显示 pagination 和 cardview 等
        onSearch: function (text) {syncTunnelListSearchUrl((text || "").trim());},
        onExpandRow: function () {$('body').setLang ('.detail-view');},
        onLoadSuccess:function (data) {$('body').setLang ('.detail-view');},
        onPostBody: function (data) { if ($(this)[0].locale != undefined ) $('body').setLang ('#table'); },
        detailFormatter: function (index, row, element) {
            var tmp = '<b langtag="word-exportflow"></b>: ' + changeunit(row.Flow.ExportFlow) + '&emsp;'
                    + '<b langtag="word-inletflow"></b>: ' + changeunit(row.Flow.InletFlow) + '&emsp;'
                    + '<b langtag="word-crypt"></b>: ' + row.Client.Cnf.Crypt + '&emsp;'
                    + '<b langtag="word-compress"></b>: ' + row.Client.Cnf.Compress + '&emsp;'
                    + '<b langtag="word-basicusername"></b>: ' + row.Client.Cnf.U + '&emsp;'
                    + '<b langtag="word-basicpassword"></b>: ' + row.Client.Cnf.P + '&emsp;'
                    + '<b langtag="word-ishttp"></b>: ' + row.IsHttp + '&emsp;'
            if (row.Mode == "p2p") {
                return tmp + "<br/><br>"
                        + '<b langtag="word-commandaccessp2p"></b>: ' + "<code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=" + row.Client.VerifyKey
                        + " -type=" + bridgeType + " -password=" + row.Password + " -target=" + row.Target.TargetStr + "</code>" + "<br/><br>"
                        + '<b langtag="word-commandaccessp2ps"></b>: ' + "<code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=" + row.Client.VerifyKey
                        + " -type=" + bridgeType + " -password=" + row.Password + " -local_type=p2ps" + "</code>" + "<br/><br>"
                        + '<b langtag="word-commandaccessp2pt"></b>: ' + "<code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=" + row.Client.VerifyKey
                        + " -type=" + bridgeType + " -password=" + row.Password + " -local_type=p2pt" + "</code>"

            }
            if (row.Mode == "secret") {
                return tmp + "<br/><br>" + '<b langtag="word-commandaccess"></b>: ' + "<code>./npc{{.win}} -server={{.ip}}:{{.p}} -vkey=" + row.Client.VerifyKey
                        + " -type=" + bridgeType + " -password=" + row.Password + " -local_type=secret" + "</code>"
            }
            return tmp
        },
        //表格的列
        columns: [
            {
                field: 'Id',//域值
                title: '<span langtag="word-id"></span>',//标题
                halign: 'center',
                visible: true//false表示不显示
            },
            {
                field: 'Id',//域值
                title: '<span langtag="word-client"></span>',//标题
                halign: 'center',
                visible: true,//false表示不显示
                formatter: function (value, row, index) {
                    return '(<a title="跳转到域名列表" href="hostlist?client_id=' + row.Client.Id + '">' + row.Client.Id + '</a>) ' + row.Client.Remark
                }
            },
            {
                field: 'Remark',//域值
                title: '<span langtag="word-remark"></span>',//标题
                halign: 'center',
                visible: true//false表示不显示
            },
            {
                field: 'Mode',//域值
                title: '<span langtag="word-scheme"></span>',//标题
                halign: 'center',
                visible: true,//false表示不显示
                formatter: function (value, row, index) {
                    return '<span langtag="scheme-' + value + '"></span>'
                }
            },
            {
                field: 'Port',//域值
                title: '<span langtag="word-port"></span>',//标题
                halign: 'center',
                visible: true//false表示不显示
            },
            {
                field: 'StripPre',//域值
                title: '<span langtag="word-stripprefix"></span>',//标题
                halign: 'center',
                visible: isFileTunnelList,//false表示不显示
                formatter: function (value, row, index) {
                    return value || '/'
                }
            },
            {
                field: 'Target',//域值
                title: isFileTunnelList ? '<span langtag="word-targetpath"></span>' : '<span langtag="word-target"></span>',//标题
                halign: 'center',
                visible: true,//false表示不显示
                formatter: function (value, row, index) {
                    if (row.Mode == "file") {
                        return row.LocalPath || ''
                    }
                    if (!row.Target) {
                        return ''
                    }
                    return row.Target.TargetStr
                }
            },
            {
                field: 'Status',//域值
                title: '<span langtag="word-status"></span>',//内容
                align: 'center',
                halign: 'center',
                visible: true,//false表示不显示
                formatter: function (value, row, index) {
                    if (value) {
                        return '<span class="badge badge-primary" langtag="word-open"></span>'
                    } else {
                        return '<span class="badge badge-badge" langtag="word-close"></span>'
                    }
                }
            },
            {
                field: 'RunStatus',//域值
                title: '<span langtag="word-runstatus"></span>',//内容
                align: 'center',
                halign: 'center',
                visible: true,//false表示不显示
                formatter: function (value, row, index) {
                    if (value) {
                        return '<span class="badge badge-primary" langtag="word-open"></span>'
                    } else {
                        return '<span class="badge badge-badge" langtag="word-close"></span>'
                    }
                }
            },
            {
                field: '',//域值
                title: '<span langtag="word-clientstatus"></span>',//内容
                align: 'center',
                halign: 'center',
                visible: true,//false表示不显示
                formatter: function (value, row, index) {
                    if (row.Client.IsConnect) {
                        return '<span class="badge badge-primary" langtag="word-online"></span>'
                    } else { // 在列表页显示存活或者长期离线提示
                        return getOfflineStatus(row.Client.LastConnectTime)
                    }
                }
            },
            {
                field: 'option',//域值
                title: '<span langtag="word-option"></span>',//内容
                align: 'center',
                halign: 'center',
                visible: true,//false表示不显示
                formatter: function (value, row, index) {
                    var buttons = ['<div class="btn-group">'];
                    buttons.push('<a href="' + indexBaseUrl + '/index/edit?id=' + row.Id
                        + '" class="btn btn-outline btn-success list-form-link"><i class="fa fa-edit"></i></a>');
                    buttons.push('<a href="' + indexBaseUrl + '/index/add?id=' + row.Id
                        + '" class="btn btn-outline btn-primary list-form-link"><i class="fa fa-copy"></i></a>');
                    if (row.Status) {
                        buttons.push(tunnelActionButton('stop', '/index/stop', row.Id, 'btn-warning', 'fa-pause'));
                    } else {
                        buttons.push(tunnelActionButton('start', '/index/start', row.Id, 'btn-primary', 'fa-play'));
                    }
                    buttons.push(tunnelActionButton('delete', '/index/del', row.Id, 'btn-danger', 'fa-trash'));
                    buttons.push('</div>');
                    return buttons.join('');
                }
            }
        ]
    });
</script>
